<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bike Rush</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="Bike Rush mouse-controlled traffic game">
      <canvas id="gameCanvas" width="900" height="1200" aria-label="Bike Rush game canvas"></canvas>
      <section class="hud" aria-label="Game status">
        <div>
          <span>Score</span>
          <strong id="scoreValue">0</strong>
        </div>
        <div>
          <span>Coins</span>
          <strong id="coinValue">0</strong>
        </div>
        <div>
          <span>Boost</span>
          <strong id="boostValue">Ready</strong>
        </div>
      </section>
      <div id="overlay" class="overlay is-visible">
        <h1>Bike Rush</h1>
        <p>Dodge traffic, collect coins, and chase your best distance.</p>
        <button id="startButton" type="button">Start Ride</button>
      </div>
    </main>
    <script src="game.js"></script>
  </body>
</html>
